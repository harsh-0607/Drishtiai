services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MONGODB_URI: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
      FRONTEND_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - redis

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  mongo_data:
